# HTTP → HTTPS 重定向
server {
    listen 80;
    server_name zzz.fysxq.lat;
    return 301 https://$host$request_uri;
}

# HTTPS 主站
server {
    listen 443 ssl;
    server_name zzz.fysxq.lat;

    # SSL 证书（由 certbot 自动填写，也可手动指定路径）
    ssl_certificate     /etc/letsencrypt/live/zzz.fysxq.lat/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zzz.fysxq.lat/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # 前端静态文件
    root /opt/selftend/frontend/dist;
    index index.html;

    # SPA 路由回退（react-router 必须）
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 反向代理到 Go 后端（支持 SSE 流式输出）
    location /api/ {
        proxy_pass             http://127.0.0.1:8080;
        proxy_http_version     1.1;
        proxy_set_header       Host $host;
        proxy_set_header       X-Real-IP $remote_addr;
        proxy_set_header       X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header       Connection '';
        proxy_buffering        off;       # SSE 必须关闭缓冲
        proxy_cache            off;
        proxy_read_timeout     300s;      # AI 流式回复可能较长
    }

    # 关闭访问日志，减少磁盘写入
    access_log off;
    error_log  /var/log/nginx/selftend_error.log warn;
}
