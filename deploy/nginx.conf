server {
    listen 80;
    server_name _;   # 匹配任意 IP / 域名，买域名后改成域名即可

    # 前端静态文件
    root /opt/selftend/frontend/dist;
    index index.html;

    # SPA 路由回退（react-router 必须）
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 反向代理到 Go 后端
    location /api/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 关闭访问日志，减少磁盘写入
    access_log off;
    error_log  /var/log/nginx/selftend_error.log warn;
}
